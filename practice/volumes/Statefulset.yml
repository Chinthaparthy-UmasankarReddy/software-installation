---
# MongoDB Headless Service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  clusterIP: "None"   # Headless service for StatefulSet DNS
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017
---
# MongoDB StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-statefulset
spec:
  serviceName: mongo
  replicas: 2
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo-container
        image: mongo:6.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: devdb
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: devdb123
        - name: MONGO_INITDB_DATABASE
          value: myappdb
        volumeMounts:
        - name: mongodbvol
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodbvol
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
# Spring Boot Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springapp
  template:
    metadata:
      labels:
        app: springapp
    spec:
      initContainers:
      - name: wait-for-mongo
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "Waiting for MongoDB..."
          until nc -z mongo-0.mongo 27017; do
            echo "MongoDB is not ready yet..."
            sleep 2
          done
          echo "MongoDB is ready!"
      containers:
      - name: springapp-container
        image: uma03/spring-boot-mongo:1
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATA_MONGODB_URI
          value: "mongodb://devdb:devdb123@mongo-0.mongo:27017,mongo-1.mongo:27017/myappdb?authSource=admin"
        - name: SPRING_DATA_MONGODB_DATABASE
          value: "myappdb"
---
# NodePort Service for Spring Boot Frontend
apiVersion: v1
kind: Service
metadata:
  name: springappsvc
spec:
  type: NodePort
  selector:
    app: springapp
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30303
