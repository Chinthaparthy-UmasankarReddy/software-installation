# ReplicaSet
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: javaweb-rs
  labels:
    app: javars
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java
  template:
    metadata:
      labels:
        app: java
    spec:
      containers:
        - name: javawebapp-container
          image: dockeruma03/java-web-apps:1
          ports:
            - containerPort: 8080

---
# NodePort Service
apiVersion: v1
kind: Service
metadata:
  name: javasvc
spec:
  type: NodePort
  selector:
    app: java
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30076
