# ReplicationController
apiVersion: v1
kind: ReplicationController
metadata:
  name: javarc
spec:
  replicas: 2
  selector:
    app: java
  template:
    metadata:
      labels:
        app: java
    spec:
      containers:
        - name: javawebapp-container
          image: dockeruma03/java-web-app:1
          ports:
            - containerPort: 8080

---
# NodePort Service
apiVersion: v1
kind: Service
metadata:
  name: javasvc
spec:
  type: NodePort
  selector:
    app: java
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30076
