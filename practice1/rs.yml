#Replicaset
apiVersion: apps/v1
kind: Replicaset
metadata:
  name: JavawebRs
  labels:
    app : javars
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java
  template:
    metadata:
      name: javawebpod
      labels:
        app: java
    spec:
      containers:
      - name: javawebappcontainer
        image: dockeruma03/javawebapp:1
        ports:
        - ContainerPort: 8080
---
#Service
apiVersion: v1
kind: Service
metadata:
  name: javasvc
spec:
  type: NodePort
  selector:
    app: java
  ports:
    - port: 80
        targetPort: 8080
        nodePort: 30076
