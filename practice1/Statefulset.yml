#Service of Loadbalencer
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  clusterIP: "None"
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017
---

#Mongodatabase
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-statefullset
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongo
  serviceName: mongo
  template:
    metadata:
    # name: mongopod
      labels:
        app: mongo
    spec:
      containers:
      - name: mongoContainer
        image: mongo
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: devdb
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: devdb@123
        volumeMounts:
        - name: mongodbvol
          mountPath: "/data/db"
  volumeClaimTemplates:
  - metadata:
      name: mongodbvol
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---

#Springapp Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Springapp
  template:
    metadata:
    # name: Springapppod
      labels:
        app: Springapp
    spec:
      containers:
      - name: springappcontainer
        image: uma03/spring-boot-mongo:1
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_DB_HOSTNAME
          value: mongo
        - name: MONGO_DB_USERNAME
          value: devdb
        - name: MONGO_DB_PASSWORD
          value: devdb@123
---


#Service for frentend web
apiVersion: v1
kind: Service
metadata:
  name: springappsvc
spec:
  type: NodePort
  selector:
    app: Springapp
  # version: one
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30303
