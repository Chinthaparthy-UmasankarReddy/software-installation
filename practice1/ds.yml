#Deamonset
apiVersion: apps/v1
kind: Deamonset
metadata:
  name: nginxDS
spec:
 #replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      name: nginxpod
      labels:
        app: nginx
    spec:
      Containes:
      - name: niginxcontainer
        image: nginx
        ports:
        - ContainerPort: 8090
---
#Service
apiVersion: v1
kind: Service
metadata:
  name: nginxsvc
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
