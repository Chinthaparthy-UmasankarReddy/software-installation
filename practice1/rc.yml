#Replication controller
apiVersion: v1
kind: ReplicationController
metadata:
  name: javaRc
spec:
  replicas: 2
  selector:
    app: java
  template:
    metadata:
      name: javawebapp
      labels:
        app: java
    spec:
      Containers:
       - name: javawebapp container
         image: uma03/java-web-app:1
         ports:
         - ContainerPort: 8080
